<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Nova Senha | Fipe Total</title>

    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Poppins:wght@400;600&display=swap"
        rel="stylesheet">

    <style>
        :root {
            --azul: #0066b3;
            --verde: #00C853;
            --cinza: #f4f6f9;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {

            font-family: Poppins;

            background: linear-gradient(135deg, #0066b3, #003466);

            min-height: 100vh;

            display: flex;
            align-items: center;
            justify-content: center;

            padding: 20px;

        }

        .card {

            background: white;

            width: 100%;
            max-width: 420px;

            padding: 35px;

            border-radius: 18px;

            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.25);

            animation: fadeUp .4s ease;

        }

        .logo {

            font-family: 'Bebas Neue';

            font-size: 2.2rem;

            color: var(--azul);

            text-align: center;

            margin-bottom: 20px;

        }

        .input-group {

            margin-bottom: 15px;

        }

        input {

            width: 100%;

            padding: 14px;

            border-radius: 10px;

            border: 1px solid #ddd;

            font-size: 14px;

        }

        input:focus {

            outline: none;

            border: 1px solid var(--azul);

        }

        .exemplo {

            font-size: 12px;

            color: #777;

            margin-top: 5px;

        }

        .barra {

            height: 6px;

            width: 100%;

            background: #eee;

            border-radius: 6px;

            margin-top: 8px;

            overflow: hidden;

        }

        .barra span {

            display: block;

            height: 100%;

            width: 0%;

            background: red;

            transition: .3s;

        }

        button {

            margin-top: 10px;

            width: 100%;

            padding: 15px;

            border: none;

            border-radius: 12px;

            background: linear-gradient(90deg, #00C853, #00e676);

            color: white;

            font-weight: 700;

            font-size: 15px;

            cursor: pointer;

            transition: .3s;

        }

        button:hover {

            transform: translateY(-2px);

            box-shadow: 0 10px 25px rgba(0, 200, 83, .35);

        }

        button:disabled {

            opacity: .6;

            cursor: not-allowed;

        }

        .loading {

            text-align: center;

            margin-top: 15px;

            display: none;

        }

        .spinner {

            width: 25px;

            height: 25px;

            border: 3px solid #eee;

            border-top: 3px solid var(--verde);

            border-radius: 50%;

            animation: spin 1s linear infinite;

            margin: auto;

        }

        .msg {

            font-size: 13px;

            margin-top: 10px;

            text-align: center;

        }

        @keyframes spin {
            to {
                transform: rotate(360deg)
            }
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(20px)
            }

            to {
                opacity: 1;
                transform: translateY(0)
            }
        }
    </style>

</head>

<body>

    <div class="card">

        <div class="logo">FIPE TOTAL</div>

        <div class="input-group">

            <input type="password" id="senha" placeholder="Nova senha">

            <div class="exemplo">
                Exemplo seguro: <b>Carro@2026</b>
            </div>

            <div class="barra">
                <span id="forca"></span>
            </div>

        </div>

        <div class="input-group">

            <input type="password" id="confirmar" placeholder="Confirmar senha">

        </div>

        <button onclick="alterarSenha()" id="btnAlterar">

            Alterar senha

        </button>

        <div class="loading" id="loading">

            <div class="spinner"></div>
            <p>Atualizando senha...</p>

        </div>

        <div class="msg" id="msg"></div>

    </div>

    <script>

        const params = new URLSearchParams(window.location.search)

        const token = params.get("token")

        const senhaInput = document.getElementById("senha")

        const barra = document.getElementById("forca")

        senhaInput.addEventListener("input", () => {

            const senha = senhaInput.value

            let forca = 0

            if (senha.length >= 6) forca += 1
            if (/[A-Z]/.test(senha)) forca += 1
            if (/[0-9]/.test(senha)) forca += 1
            if (/[@$!%*?&]/.test(senha)) forca += 1

            const porcentagem = forca * 25

            barra.style.width = porcentagem + "%"

            if (porcentagem <= 25) barra.style.background = "red"
            else if (porcentagem <= 50) barra.style.background = "orange"
            else if (porcentagem <= 75) barra.style.background = "#2196F3"
            else barra.style.background = "#00C853"

        })

        async function alterarSenha() {

            const senha = document.getElementById("senha").value
            const confirmar = document.getElementById("confirmar").value
            const msg = document.getElementById("msg")

            if (senha !== confirmar) {

                msg.innerText = "As senhas não coincidem"
                msg.style.color = "red"

                return

            }

            if (senha.length < 6 ||
                !/[@$!%*?&]/.test(senha) ||
                !/\\d/.test(senha)) {

                msg.innerText = "Senha fraca. Use letras, números e símbolo."
                msg.style.color = "red"

                return

            }

            const btn = document.getElementById("btnAlterar")

            btn.disabled = true

            document.getElementById("loading").style.display = "block"

            try {

                const res = await fetch("https://fip-total-backend.onrender.com/api/nova-senha", {

                    method: "POST",

                    headers: {
                        "Content-Type": "application/json"
                    },

                    body: JSON.stringify({
                        token,
                        senha
                    })

                })

                const data = await res.json()

                if (data.sucesso) {

                    msg.innerText = "Senha alterada com sucesso!"
                    msg.style.color = "green"

                    setTimeout(() => {

                        window.location.href = "login.html"

                    }, 2000)

                } else {

                    msg.innerText = data.erro

                    msg.style.color = "red"

                }

            } catch {

                msg.innerText = "Erro ao alterar senha"

                msg.style.color = "red"

            }

            btn.disabled = false

        }

    </script>

</body>

</html>
